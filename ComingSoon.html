<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeTech | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030308;
            font-family: 'Inter', sans-serif;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #d4d4d8 40%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* FIX 1: Proper spinner — no broken Tailwind classes */
        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        /* When button is in dark (white bg) state */
        .btn-spinner.dark {
            border-color: rgba(0, 0, 0, 0.2);
            border-top-color: #111827;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030308; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #e4e4e7;
            -webkit-box-shadow: 0 0 0px 1000px #18181b inset;
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col justify-center items-center px-6 relative overflow-hidden">

    <!-- Background -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-red-600/8 rounded-full blur-[150px] animate-pulse-slow"></div>
        <div class="absolute top-1/3 left-1/4 w-[400px] h-[400px] bg-orange-600/5 rounded-full blur-[100px] animate-float"></div>
        <div class="absolute bottom-1/3 right-1/4 w-[300px] h-[300px] bg-red-800/5 rounded-full blur-[80px] animate-float-delayed"></div>
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 40px 40px;"></div>
    </div>

    <!-- Floating dots -->
    <div class="absolute top-20 left-10 w-2 h-2 bg-red-500/30 rounded-full animate-float hidden md:block"></div>
    <div class="absolute top-40 right-20 w-3 h-3 bg-orange-500/20 rounded-full animate-float-delayed hidden md:block"></div>
    <div class="absolute bottom-32 left-1/4 w-1.5 h-1.5 bg-red-400/40 rounded-full animate-float hidden md:block"></div>

    <!-- Main Content -->
    <main class="relative z-10 text-center max-w-xl mx-auto space-y-8">

        <div class="inline-flex items-center gap-2 bg-red-600/10 border border-red-500/20 text-red-400 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest animate-pulse">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
            Under Development
        </div>

        <div class="space-y-4">
            <h1 class="font-display text-4xl md:text-6xl font-bold tracking-tight leading-none hero-gradient">
                Innovating<br>Something New
            </h1>
            <p class="text-gray-400 text-sm md:text-base max-w-md mx-auto leading-relaxed">
                We are currently building and testing this feature alongside engineering teams to guarantee optimal safety standards before release.
            </p>
        </div>

        <div class="bg-white/[0.02] border border-white/5 backdrop-blur-md p-6 rounded-2xl max-w-md mx-auto space-y-4">
            <h2 class="text-white font-semibold text-sm tracking-wide">Get notified when this feature goes live</h2>

            <form id="subscribe-form" novalidate class="space-y-3">
                <div>
                    <input
                        id="sub-email"
                        type="email"
                        placeholder="Enter your email address"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-red-500/50"
                        required
                        autocomplete="email"
                    >
                    <!-- FIX 4: error and success both visible independently, not competing -->
                    <p id="sub-error"   class="text-left text-xs text-red-400 mt-2 hidden"></p>
                    <p id="sub-success" class="text-center text-xs text-green-400 font-medium mt-2 hidden"></p>
                </div>

                <!-- FIX 1: Spinner is a real CSS class, not broken Tailwind -->
                <button
                    type="submit"
                    id="btn-sub-submit"
                    class="w-full bg-white text-gray-950 font-bold text-xs uppercase tracking-wider py-3 px-6 rounded-xl hover:bg-red-500 hover:text-white transition-all duration-300 flex items-center justify-center gap-2"
                >
                    <span id="btn-sub-text">Notify Me</span>
                    <div id="btn-sub-spinner" class="btn-spinner dark hidden"></div>
                </button>
            </form>
        </div>

        <div class="pt-4">
            <button
                onclick="goBack()"
                class="inline-flex items-center gap-2 bg-gradient-to-r from-red-700 via-red-600 to-orange-600 hover:from-red-600 hover:to-orange-500 text-white font-extrabold text-xs uppercase tracking-wider py-4 px-10 rounded-xl shadow-[0_10px_40px_-10px_rgba(239,68,68,0.3)] hover:shadow-[0_20px_60px_-15px_rgba(239,68,68,0.45)] transition-all duration-300 hover:-translate-y-0.5 outline-none"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Go Back
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="absolute bottom-8 text-center z-10">
        <p class="text-[10px] text-gray-700 uppercase tracking-[0.25em] font-medium">
            &copy; 2026 DeTech Platform Hub
        </p>
    </footer>

    <!-- Firebase SDKs — module format (same pattern as your main index.html) -->
    <script type="module">
        import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc,
                 query, where, getDocs }                  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ── Firebase config ──────────────────────────────────────────
        const firebaseConfig = {
            apiKey:            "AIzaSyAM8SIm4DIi800D-Apa2SgfPpHVh-hrjUc",
            authDomain:        "website-791e9.firebaseapp.com",
            projectId:         "website-791e9",
            storageBucket:     "website-791e9.firebasestorage.app",
            messagingSenderId: "35656723392",
            appId:             "1:35656723392:web:dd4447685537af9a32f625"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        // ── UI helpers ───────────────────────────────────────────────
        const emailInput  = document.getElementById('sub-email');
        const subError    = document.getElementById('sub-error');
        const subSuccess  = document.getElementById('sub-success');
        const btnSubmit   = document.getElementById('btn-sub-submit');
        const btnText     = document.getElementById('btn-sub-text');
        const btnSpinner  = document.getElementById('btn-sub-spinner');

        function resetUI() {
            // FIX 2 & 4: always fully reset button AND hide spinner on every path
            btnSubmit.disabled    = false;
            btnText.textContent   = 'Notify Me';
            btnSpinner.classList.add('hidden');
            emailInput.style.borderColor = '';
        }

        function setLoading() {
            btnSubmit.disabled  = true;
            btnText.textContent = 'Subscribing...';
            btnSpinner.classList.remove('hidden');
        }

        function showError(msg) {
            subError.textContent = msg;
            subError.classList.remove('hidden');
            subSuccess.classList.add('hidden');
            emailInput.style.borderColor = '#ef4444';
            resetUI();
        }

        function showSuccess(msg) {
            subSuccess.textContent = msg;
            subSuccess.classList.remove('hidden');
            subError.classList.add('hidden');
            emailInput.style.borderColor = '#22c55e';
            // FIX 4: hide spinner properly on success too
            btnSpinner.classList.add('hidden');
            btnText.textContent = 'Subscribed ✓';
        }

        // ── Firestore with timeout ───────────────────────────────────
        // FIX 5: wrap every Firestore call with a 10-second timeout
        function withTimeout(promise, ms = 10000) {
            const timeout = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('TIMEOUT')), ms)
            );
            return Promise.race([promise, timeout]);
        }

        // ── Form submit ──────────────────────────────────────────────
        document.getElementById('subscribe-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset previous messages
            subError.classList.add('hidden');
            subSuccess.classList.add('hidden');
            emailInput.style.borderColor = '';

            const email = emailInput.value.trim();

            // Client-side validation
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address.');
                return;
            }

            setLoading();

            try {
                // FIX 2 & 5: duplicate check with timeout
                const q        = query(collection(db, 'subscribers'), where('email', '==', email));
                const snapshot = await withTimeout(getDocs(q));

                if (!snapshot.empty) {
                    showSuccess("You're already on the list! Redirecting you home... 🚀");
                    emailInput.value = '';
                    setTimeout(() => { window.location.href = getHomeUrl(); }, 2500);
                    return;
                }

                // FIX 2 & 5: addDoc with timeout
                await withTimeout(addDoc(collection(db, 'subscribers'), {
                    email,
                    subscribedAt: new Date().toISOString(),
                    // FIX 6: store a clean page name, not the full filesystem path
                    featurePage: 'fire-link-lite-app'
                }));

                showSuccess('You\'re on the list! Taking you home... 🔥');
                emailInput.value = '';
                setTimeout(() => { window.location.href = getHomeUrl(); }, 2500);

            } catch (err) {
                console.error('Subscribe error:', err);

                // FIX 2: reset button on EVERY error path — timeout or Firestore
                if (err.message === 'TIMEOUT') {
                    showError('Request timed out. Please check your connection and try again.');
                } else if (err.code === 'permission-denied') {
                    showError('Submission blocked. Please contact support at admin@detechnologies.co.za');
                } else {
                    showError('Something went wrong. Please try again in a moment.');
                }
            }
        });

        // ── Navigation helpers ───────────────────────────────────────

        // FIX 3: resolve home URL safely regardless of where this file lives
        function getHomeUrl() {
            const origin = window.location.origin;
            return origin + '/';
        }

        window.goBack = function () {
            if (!document.referrer || window.history.length <= 1) {
                window.location.href = getHomeUrl();
            } else {
                window.history.back();
            }
        };

        // Escape key → go back
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.goBack();
        });

        // Parallax on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth  - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            document.querySelectorAll('.animate-float, .animate-float-delayed').forEach((el, i) => {
                const f = (i + 1) * 0.5;
                el.style.transform = `translate(${x * f}px, ${y * f}px)`;
            });
        });

    </script>
</body>
</html>
